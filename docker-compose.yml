version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URL: ${MONGODB_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_KEY_NAME: ${SESSION_KEY_NAME}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - mongodb
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin}
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
